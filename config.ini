[battery]
capacity_mah = 6000
min_voltage_v = 2.75
max_voltage_v = 4.2
warn_30_pct = 30
warn_20_pct = 20
warn_10_pct = 10
shutdown_countdown_sec = 60

[sensor]
ina219_addr = 0x43
i2c_bus = 2
charge_current_threshold_ma = 50
poll_interval_ms = 10000

[logging]
; Leave log_file empty to log to stdout only (journald when running as service)
log_file =
max_bytes = 1048576
backup_count = 3
