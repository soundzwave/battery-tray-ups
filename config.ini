[notifications]
; Notification backend: qt (system tray bubble) or notify-send (libnotify, works better on i3/openbox/fluxbox)
backend = qt

[battery]
capacity_mah = 12000
discharge_curve = lipo
min_voltage_v = 2.75
max_voltage_v = 4.2
warn_30_pct = 30
warn_20_pct = 20
warn_10_pct = 10
warn_5_pct = 5
shutdown_countdown_sec = 60

[sensor]
ina219_addr = 0x43
i2c_bus = 2
ups_controller_addr = 0x2d
charge_current_threshold_ma = 50
poll_interval_ms = 10000

[power]
; CPU frequency governor when on battery vs AC
battery_governor = powersave
ac_governor = ondemand
; Wi-Fi interface to manage power saving (leave empty to disable)
wifi_interface = wlan0
wifi_powersave_on_battery = true

[output]
; JSON status file read by conky/waybar/scripts. Leave empty to disable.
status_file = /tmp/battery_status.json

[logging]
; Leave log_file empty to log to stdout only (journald when running as service)
log_file =
max_bytes = 1048576
backup_count = 3
